services:
  redis:
    image: docker.io/library/redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Containerfile
    environment:
      BIND_ADDR: 0.0.0.0:8080
      REDIS_URL: redis://redis:6379
      YOLO_DETECT_URL: http://model:8765/api/v1/detect
    depends_on:
      - redis
      - model
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Containerfile
    depends_on:
      - backend
    ports:
      - "3000:80"
      - "3443:443"

  model:
    build:
      context: ./programming_exam
      dockerfile: Containerfile
    environment:
      BACKEND_URL: http://backend:8080
    ports:
      - "8765:8443"
      - "8766:8765"

volumes:
  redis-data:
