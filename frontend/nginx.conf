server {
  listen 80;
  server_name _;
  add_header Permissions-Policy "camera=(self \"http://localhost:8765\" \"http://127.0.0.1:8765\"), microphone=(self \"http://localhost:8765\" \"http://127.0.0.1:8765\")" always;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://backend:8080/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Camera streams are long-lived multipart/x-mixed-replace
    # responses; disable proxy buffering and let the read timeout
    # track the actual connection lifetime.
    proxy_buffering off;
    proxy_read_timeout 24h;
    proxy_send_timeout 24h;
  }

  location /health {
    proxy_pass http://backend:8080/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
